services:
  # PostgreSQL dengan pgvector extension
  postgres:
    image: pgvector/pgvector:pg16
    container_name: chatbot_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_db}
      POSTGRES_INITDB_ARGS: "-c shared_preload_libraries=vector"
    ports:
      - "5433:5432"   # port 5432 mungkin dipakai cdl_postgres, pakai 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-chatbot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatbot-network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: chatbot_app
    env_file:
      - .env.local
    environment:
      PORT: 3001   # run on port 3001 to avoid conflict with CDL app on 3000

      # PostgreSQL - gunakan nama container sebagai hostname (dalam docker network)
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-123}@chatbot_postgres:5432/${POSTGRES_DB:-chatbot_db}
      POSTGRES_HOST: chatbot_postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123}
      POSTGRES_DB: ${POSTGRES_DB:-chatbot_db}

      # App Config
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_PUBLIC_APP_NAME: "Sontoloyo AI"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://chat.adi-muhamad.my.id}
    ports:
      - "3001:3001"  # expose port 3001 ke host
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - chatbot-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      start-period: 40s
      retries: 3

volumes:
  postgres_data:
    external: true
    name: blog-assistant-test_postgres_data

networks:
  chatbot-network:
    driver: bridge
